name: Deploy — Asset Manager

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # OIDC
  contents: read
  pull-requests: write

env:
  AWS_REGION:      ap-south-1
  LAMBDA_NAME:     asset-tracker-prod-api
  UI_BUCKET:       asset-tracker-ui-755231954480
  TF_VERSION:      1.8.4
  NODE_VERSION:    "20"
  TF_DIR:          terraform

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────────────
  build:
    name: Build Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Bundle
        run: npm run build

      - name: Zip bundle
        run: zip -j dist/lambda.zip dist/handler.js

      - uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: dist/lambda.zip
          retention-days: 1

  # ── 2. Deploy Lambda (push to main only) ──────────────────────────────────
  deploy-lambda:
    name: Deploy Lambda
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: dist/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GHA-Lambda-${{ github.run_id }}

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_NAME }} \
            --zip-file fileb://dist/lambda.zip \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_NAME }} \
            --region ${{ env.AWS_REGION }}
          echo "✅ Lambda updated" >> $GITHUB_STEP_SUMMARY

  # ── 3. Deploy Frontend (push to main only) ────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GHA-Frontend-${{ github.run_id }}

      - name: Upload to S3
        run: |
          aws s3 cp frontend/index.html \
            s3://${{ env.UI_BUCKET }}/index.html \
            --content-type "text/html" \
            --cache-control "no-cache"
          echo "🌐 http://${{ env.UI_BUCKET }}.s3-website.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_STEP_SUMMARY

  # ── 4. Terraform (only when terraform/ files change) ──────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            terraform:
              - 'terraform/**'

      - name: Configure AWS credentials (OIDC)
        if: steps.changes.outputs.terraform == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GHA-Terraform-${{ github.run_id }}

      - name: Download Lambda zip (Terraform needs it for hash)
        if: steps.changes.outputs.terraform == 'true'
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: dist/

      - name: Setup Terraform
        if: steps.changes.outputs.terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        if: steps.changes.outputs.terraform == 'true'
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      # Apply GitHub Actions role policy first so this run gains s3:PutBucketCORS
      # before S3 CORS / other bucket updates (avoids chicken-and-egg 403).
      - name: Terraform Apply (GitHub Actions IAM first)
        if: steps.changes.outputs.terraform == 'true'
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -input=false -auto-approve \
            -target=aws_iam_role_policy.github_actions_deploy \
            -var="environment=prod" \
            -var="aws_region=${{ env.AWS_REGION }}"

      - name: Terraform Apply (full)
        if: steps.changes.outputs.terraform == 'true'
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -input=false -auto-approve \
            -var="environment=prod" \
            -var="aws_region=${{ env.AWS_REGION }}"
          echo "✅ Terraform applied" >> $GITHUB_STEP_SUMMARY

      - name: Skipped
        if: steps.changes.outputs.terraform != 'true'
        run: echo "No terraform/ changes — skipping Terraform apply."

  # ── 5. Terraform Plan on PRs ──────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan (PR)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            terraform:
              - 'terraform/**'

      - name: Configure AWS credentials (OIDC)
        if: steps.changes.outputs.terraform == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GHA-Plan-${{ github.run_id }}

      - uses: actions/download-artifact@v4
        if: steps.changes.outputs.terraform == 'true'
        with:
          name: lambda-zip
          path: dist/

      - uses: hashicorp/setup-terraform@v3
        if: steps.changes.outputs.terraform == 'true'
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init & Plan
        if: steps.changes.outputs.terraform == 'true'
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false
          terraform plan -input=false \
            -var="environment=prod" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -no-color 2>&1 | tee plan.txt

      - name: Comment plan on PR
        if: steps.changes.outputs.terraform == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_DIR }}/plan.txt', 'utf8');
            const body = '## Terraform Plan\n```hcl\n' +
              (plan.length > 60000 ? plan.slice(0,60000)+'...(truncated)' : plan) +
              '\n```';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
