name: Deploy — Asset Manager

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # required for OIDC token
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-south-1
  TF_VERSION: 1.8.4
  NODE_VERSION: "20"
  TF_DIR: terraform
  # Set in repo Settings → Secrets and variables → Actions → Variables:
  #   AWS_ROLE_ARN  →  output from: terraform output github_actions_role_arn

jobs:
  # --------------------------------------------------------------------------
  # 1. Build + type-check Lambda bundle
  # --------------------------------------------------------------------------
  build:
    name: Build Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build bundle
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-dist
          path: dist/
          retention-days: 1

  # --------------------------------------------------------------------------
  # 2. Terraform plan  (every PR)
  # --------------------------------------------------------------------------
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-dist
          path: dist/

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Plan-${{ github.run_id }}

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -input=false \
            -var="environment=prod" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -out=tfplan.binary
          terraform show -no-color tfplan.binary > plan.txt

      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.existsSync('${{ env.TF_DIR }}/plan.txt')
              ? fs.readFileSync('${{ env.TF_DIR }}/plan.txt', 'utf8')
              : 'Plan output unavailable.';
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n... (truncated)'
              : plan;
            const body = `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # --------------------------------------------------------------------------
  # 3. Terraform apply  (merge to main only)
  # --------------------------------------------------------------------------
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-dist
          path: dist/

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Apply-${{ github.run_id }}

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            -var="environment=prod" \
            -var="aws_region=${{ env.AWS_REGION }}"

      - name: Capture outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "API_ENDPOINT=$(terraform output -raw api_endpoint)" >> $GITHUB_STEP_SUMMARY
          echo "LAMBDA=$(terraform output -raw lambda_function_name)" >> $GITHUB_STEP_SUMMARY
          echo "TABLE=$(terraform output -raw dynamodb_table_name)" >> $GITHUB_STEP_SUMMARY
